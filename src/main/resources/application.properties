spring.application.name=bookify

# Load variables from the .env file at the project root (KEY=VALUE is valid .properties syntax).
# optional: -> app still starts if .env is missing (e.g. CI provides real OS env vars instead).
spring.config.import=optional:file:.env[.properties]

# ---- Datasource (Supabase / PostgreSQL) ----
# Replace with your Supabase project credentials, or provide them via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bookify}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ---- JPA / Hibernate ----
# Flyway owns the schema, so keep ddl-auto=validate (never let Hibernate create tables).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- Actuator ----
# เปิดเฉพาะ health endpoint ออก web (ไม่เปิดตัวอื่นเพื่อไม่ให้รั่วข้อมูล)
management.endpoints.web.exposure.include=health
# ไม่โชว์รายละเอียด health ต่อ request ที่ไม่ได้ auth (กันข้อมูล DB/internal รั่ว)
management.endpoint.health.show-details=never

# ---- JWT (self-issued, HS256) ----
# Secret comes from env only (.env in dev / OS env in prod) so no secret is committed.
# No default on purpose: if JWT_SECRET is unset the app fails fast at startup. See .env.example.
app.jwt.secret=${JWT_SECRET}
# Token lifetime in seconds (default 24 hours).
app.jwt.expiration=${JWT_EXPIRATION:86400}
