name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ยกเลิก run เก่าของ branch/PR เดียวกันเมื่อมี push ใหม่ ประหยัด CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Docker มีอยู่แล้วบน ubuntu runner -> Testcontainers (postgres) รันได้เลย
    # JWT secret สำหรับเทสถูก set ผ่าน maven-surefire-plugin ใน pom.xml ไม่ต้องพึ่ง env ตรงนี้
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & test
        run: ./mvnw --batch-mode --no-transfer-progress verify
        env:
          # ค่าไม่ลับ -> เก็บเป็น Repository Variable (vars) แก้ได้ใน UI
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION }}
          # ค่าลับ -> เก็บเป็น Repository Secret (secrets) ไม่โผล่ใน log
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Upload test reports
        if: always() # อัปโหลดแม้ test fail เพื่อเอาไว้ดูสาเหตุ
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
